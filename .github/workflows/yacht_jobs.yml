name: Yacht Engineer Job Monitor

on:
  schedule:
    - cron: "0 8 * * *"   # 5:00 AM Uruguay
    - cron: "0 17 * * *"  # 2:00 PM Uruguay
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    # Permiso para hacer commit al repo
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper + send email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
          LINKEDIN_RSS_URL: ${{ secrets.LINKEDIN_RSS_URL }}
        run: python scripts/scraper.py

      - name: Generate HTML viewer
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
          LINKEDIN_RSS_URL: ${{ secrets.LINKEDIN_RSS_URL }}
          VIEWER_PASSWORD: ${{ secrets.VIEWER_PASSWORD }}
        run: python generate_viewer.py

      # Renombrar el output a index.html para GitHub Pages
      - name: Prepare for GitHub Pages
        run: cp viewer_output.html docs/index.html

      # Commitear el index.html actualizado al repo
      - name: Commit updated viewer
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: update job viewer [skip ci]"
          git push

      - name: Save updated seen jobs
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
